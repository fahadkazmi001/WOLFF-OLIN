<title>WOLFF OLIN - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Montserrat,sans-serif}
body{background:#f5c400;display:flex;align-items:center;justify-content:center;color:#111}
.bg span{position:absolute;border:2px solid rgba(0,0,0,.08);border-radius:50%;animation:float 12s infinite ease-in-out}
.bg span:nth-child(1){width:220px;height:220px;left:8%;top:12%}
.bg span:nth-child(2){width:140px;height:140px;right:10%;top:18%;animation-duration:9s}
.bg span:nth-child(3){width:300px;height:300px;right:8%;bottom:5%}
@keyframes float{50%{transform:translateY(-25px) rotate(8deg)}}
.wrap{text-align:center;position:relative;z-index:2;padding:20px;animation:fade 1.3s}
@keyframes fade{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.logo{width:90px;height:90px;border:8px solid #111;border-radius:50%;margin:0 auto 24px;position:relative;animation:spin 8s linear infinite}
.logo:after{content:"";position:absolute;left:42px;top:-8px;width:8px;height:100px;background:#111;transform:rotate(35deg)}
@keyframes spin{50%{transform:rotate(8deg)}}
h1{font-size:78px;letter-spacing:10px;margin:0}
.tag{letter-spacing:8px;margin:15px 0 30px}
.line{width:120px;height:3px;background:#111;margin:0 auto 40px;animation:grow 2s infinite alternate}
@keyframes grow{to{width:220px}}
.brush{display:inline-block;background:#111;color:#f5c400;padding:24px 70px;font-size:58px;font-weight:900;transform:rotate(-2deg);box-shadow:0 18px 35px rgba(0,0,0,.25);animation:pulse 2.5s infinite}
@keyframes pulse{50%{transform:rotate(-2deg) scale(1.04)}}
p{font-size:24px;line-height:1.7}
.bar{width:280px;height:5px;background:rgba(0,0,0,.15);margin:40px auto;border-radius:5px;overflow:hidden}
.bar i{display:block;height:100%;width:35%;background:#111;animation:load 2.8s infinite}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.site{letter-spacing:4px}
@media(max-width:700px){h1{font-size:42px}.brush{font-size:30px;padding:16px 30px}p{font-size:18px}.tag{letter-spacing:3px}}
</style></head><body><div class="bg"><span></span><span></span><span></span></div>
<div class="wrap"><div class="logo"></div><h1>WOLFF OLIN</h1><div class="tag">BRANDING BEYOND BOUNDARIES</div><div class="line"></div><div class="brush">COMING SOON</div><p>We're crafting a bold new digital experience.<br>Stay tuned for something remarkable.</p><div class="bar"><i></i></div><div class="site">www.wolffolin.com</div></div></body></html>
